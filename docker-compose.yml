version: '3.5'

services:
  # PostgreSQL Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg18-trixie
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: companion_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    # PostgreSQL 18+ uses /var/lib/postgresql (not /data) for proper pg_upgrade support

  # Temporal Server (We will need this later for the AI logic)
  temporal:
    image: temporalio/admin-tools
    container_name: temporal-dev-server
    ports:
      - "7233:7233"
      - "8233:8233"
    entrypoint: ["temporal", "server", "start-dev", "--ip", "0.0.0.0"]
    volumes:
      - temporal_data:/home/temporal

  # Redis - real-time token streaming via pub/sub
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save ""  # Disable persistence for dev (pure in-memory)

volumes:
  postgres_data:
  temporal_data:
  redis_data: